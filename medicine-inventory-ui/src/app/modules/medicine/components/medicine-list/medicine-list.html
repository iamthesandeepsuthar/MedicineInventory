<div class="d-flex justify-content-between align-items-center mb-3">

  <div class="d-flex align-items-center gap-2">
    <input
      class="form-control"
      style="width: 300px;"
      [(ngModel)]="search"
      placeholder="Search by Name or Brand">

    <button
      class="btn btn-primary"
      title="Search"
      (click)="load()">
      <i class="bi bi-search"></i> Search
    </button>
  </div>

  <button
    class="btn btn-success"
    title="Add new medicine"
    routerLink="/medicines/add">
    <i class="bi bi-plus-lg"></i> Add Medicine
  </button>

</div>

<table class="table table-bordered">
  <thead class="table-dark">
    <tr>
      <th>Name</th>
      <th>Brand</th>
      <th>Expiry</th>
      <th>Qty</th>
      <th>Price</th>
      <th width="100">Action</th>
    </tr>
  </thead>

  <tbody>
    <tr
      *ngFor="let medicine of medicines()"
      [class]="getMedicineClass(medicine)">

      <td>{{ medicine.fullName }}</td>
      <td>{{ medicine.brand }}</td>
      <td>{{ medicine.expiryDate | date }}</td>
      <td>{{ medicine.quantity }}</td>
      <td>{{ medicine.price | number:'1.2-2' }}</td>

      <td class="text-center">
        <button
          class="btn btn-sm btn-warning me-1 rounded-circle"
          style="width:32px;height:32px;padding:0;"
          title="Edit medicine"
          [routerLink]="['/medicines/edit', medicine.id]">
          <i class="bi bi-pencil-fill"></i>
        </button>

        <button
          class="btn btn-sm btn-danger rounded-circle"
          style="width:32px;height:32px;padding:0;"
          title="Delete medicine"
          (click)="delete(medicine.id)">
          <i class="bi bi-trash-fill"></i>
        </button>
      </td>
    </tr>
  </tbody>
</table>
