<div class="card">
    <div class="card-header">
        {{ isEdit ? 'Edit Medicine' : 'Add Medicine' }}
    </div>

    <div class="card-body">

        <form [formGroup]="form">

            <div class="mb-3">
                <label>Name</label>
                <input class="form-control" formControlName="fullName">
            </div>

            <div class="mb-3">
                <label>Brand</label>
                <input class="form-control" formControlName="brand">
            </div>

            <div class="mb-3">
                <label>Expiry Date</label>
                <input type="date" class="form-control" formControlName="expiryDate">
            </div>

            <div class="mb-3">
                <label>Quantity</label>
                <input type="number" class="form-control" formControlName="quantity">
            </div>

            <div class="mb-3">
                <label>Price</label>
                <input type="number" step="0.01" class="form-control" formControlName="price">
            </div>

            <div class="mb-3">
                <label>Notes</label>
                <textarea rows="3" class="form-control" formControlName="notes">
          </textarea>
            </div>

            <button class="btn btn-success" type="button" (click)="save()">
                Save
            </button>

        </form>

    </div>
</div>
