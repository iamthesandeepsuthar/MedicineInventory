<div class="card">
    <div class="card-header">
        {{ isEdit ? 'Edit Medicine' : 'Add Medicine' }}
    </div>

    <div class="card-body">

        <form [formGroup]="form">

            <div class="mb-3">
                <label>Name <span class="text-danger">*</span></label>
                <input class="form-control" formControlName="fullName"
                    [class.is-invalid]="form.get('fullName')?.invalid && (form.get('fullName')?.dirty || form.get('fullName')?.touched)">
                <div class="invalid-feedback">
                    Name is required.
                </div>
            </div>

            <div class="mb-3">
                <label>Brand <span class="text-danger">*</span></label>
                <input class="form-control" formControlName="brand"
                    [class.is-invalid]="form.get('brand')?.invalid && (form.get('brand')?.dirty || form.get('brand')?.touched)">
                <div class="invalid-feedback">
                    Brand is required.
                </div>
            </div>

            <div class="mb-3">
                <label>Expiry Date <span class="text-danger">*</span></label>
                <input type="date" class="form-control" formControlName="expiryDate"
                    [class.is-invalid]="form.get('expiryDate')?.invalid && (form.get('expiryDate')?.dirty || form.get('expiryDate')?.touched)">
                <div class="invalid-feedback">
                    Expiry date is required.
                </div>
            </div>

            <div class="mb-3">
                <label>Quantity <span class="text-danger">*</span></label>
                <input type="number" step="1" class="form-control" formControlName="quantity"
                    (keypress)="onQuantityKeyPress($event)"
                    [class.is-invalid]="form.get('quantity')?.invalid && (form.get('quantity')?.dirty || form.get('quantity')?.touched)">
                <div class="invalid-feedback">
                    <span *ngIf="form.get('quantity')?.errors?.['required']">Quantity is required.</span>
                    <span *ngIf="form.get('quantity')?.errors?.['pattern'] || form.get('quantity')?.errors?.['min']">Quantity must be a non-negative whole number.</span>
                </div>
            </div>

            <div class="mb-3">
                <label>Price <span class="text-danger">*</span></label>
                <input type="number" step="0.01" class="form-control" formControlName="price"
                    (keypress)="onPriceKeyPress($event, form.get('price')?.value?.toString() || '')"
                    [class.is-invalid]="form.get('price')?.invalid && (form.get('price')?.dirty || form.get('price')?.touched)">
                <div class="invalid-feedback">
                    <span *ngIf="form.get('price')?.errors?.['required']">Price is required.</span>
                    <span *ngIf="form.get('price')?.errors?.['pattern'] || form.get('price')?.errors?.['min']">Price must be a non-negative number with at most 2 decimal places.</span>
                </div>
            </div>

            <div class="mb-3">
                <label>Notes</label>
                <textarea rows="3" class="form-control" formControlName="notes"></textarea>
            </div>

            <button class="btn btn-success me-2" type="button" (click)="save()">
                <i class="bi bi-check-lg me-1"></i> Save
            </button>

            <button class="btn btn-secondary" type="button" routerLink="/medicines">
                <i class="bi bi-x-lg me-1"></i> Cancel
            </button>

        </form>

    </div>
</div>
