<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Sales Records</h3>
  <button class="btn btn-success" title="Record a new sale" routerLink="/sales/create">
    <i class="bi bi-plus-lg"></i> Record Sale
  </button>
</div>

<table class="table table-bordered">
  <thead class="table-dark">
    <tr>
      <th>Medicine Name</th>
      <th>Quantity</th>
      <th>Unit Price</th>
      <th>Total Price</th>
      <th>Sale Date</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let sale of sales()">
      <td>{{ sale.medicineName }}</td>
      <td>{{ sale.quantity }}</td>
      <td>{{ sale.unitPrice | number:'1.2-2' }}</td>
      <td>{{ sale.totalPrice | number:'1.2-2' }}</td>
      <td>{{ sale.saleDate | date:'medium' }}</td>
    </tr>
    <tr *ngIf="sales().length === 0">
      <td colspan="5" class="text-center text-muted">No sales records found.</td>
    </tr>
  </tbody>
</table>
